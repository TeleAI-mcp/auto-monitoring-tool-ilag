name: Auto-close wontfix issues

on:
  issues:
    types: [labeled, opened, reopened]

jobs:
  close-wontfix:
    runs-on: ubuntu-latest
    steps:
      - name: Close issues with wontfix label
        uses: actions/github-script@v7
        with:
          script: |
            if (context.payload.action === 'labeled' || context.payload.action === 'opened' || context.payload.action === 'reopened') {
              const issue = context.payload.issue;
              const labels = issue.labels.map(label => label.name);
              
              if (labels.includes('wontfix')) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed'
                });
                console.log(`Closed issue #${issue.number} with wontfix label`);
              }
            }
